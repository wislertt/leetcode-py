name: publish-python-package

on:
    workflow_call:
        inputs:
            version:
                required: true
                type: string
                description: "PEP440 version string"
            registry:
                required: false
                type: string
                description: "Publish registry (pypi or test-pypi)"
                default: "test-pypi"
            python_version:
                required: false
                type: string
                description: "Python version"
        secrets:
            PYPI_API_TOKEN:
                required: true

jobs:
    publish:
        runs-on: ubuntu-latest

        steps:
            - name: checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: set-python-version
              run: echo "${{ inputs.python_version }}" > .python-version

            - name: setup-mise
              uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

            - name: install-dependencies
              run: uv sync --all-extras --all-groups --frozen

            - name: setup-path
              run: echo "${{ github.workspace }}/.venv/bin" >> "$GITHUB_PATH"

            - name: publish
              run: |
                  BAKE_PUBLISH_TOKEN=${{ secrets.PYPI_API_TOKEN }} \
                  bake publish \
                      --registry "${{ inputs.registry }}" \
                      --version "${{ inputs.version }}"
